<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>888Greys | Stateful Chat Deck</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --panel: #111827;
      --panel-2: #0f172a;
      --line: #243041;
      --text: #d1d9e0;
      --muted: #8b9bb4;
      --accent: #58a6ff;
      --accent-2: #3b82f6;
      --ok: #3fb950;
      --danger: #f85149;
      --user: #132235;
      --assistant: #111b2d;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 5%, rgba(88, 166, 255, 0.10), transparent 28%),
        radial-gradient(circle at 90% 12%, rgba(24, 93, 194, 0.14), transparent 36%),
        var(--bg);
      font-family: "IBM Plex Mono", monospace;
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100vh;
      gap: 0;
      overflow: hidden;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #0a0f1a, #0d1320 60%, #0b1322);
      padding: 14px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    .brand {
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(20, 32, 52, 0.55);
    }

    .brand h1 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.73rem;
    }

    #new-chat-btn {
      border: 1px solid #2f81f7;
      background: linear-gradient(180deg, #1f6feb, #1a62cf);
      color: #eff6ff;
      border-radius: 10px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 10px;
    }

    #clear-context-btn {
      border: 1px solid #35547f;
      background: linear-gradient(180deg, #24364f, #1b2b43);
      color: #d7e6ff;
      border-radius: 10px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 10px;
    }

    .sessions {
      margin-top: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 3px;
    }

    .session-item {
      border: 1px solid var(--line);
      background: #111b2d;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-family: inherit;
      width: 100%;
    }

    .session-item.active {
      border-color: #3b82f6;
      background: #172845;
    }

    .session-title {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .session-meta {
      color: var(--muted);
      font-size: 0.7rem;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 0.8rem;
    }

    #status { color: var(--ok); }
    #model-name { color: #7ee787; }

    .chat-wrap {
      min-height: 0;
      display: flex;
      justify-content: center;
      overflow: hidden;
      height: 100%;
    }

    #chat-container {
      width: min(960px, 100%);
      height: 100%;
      overflow-y: auto;
      min-height: 0;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .msg {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      line-height: 1.55;
      animation: enter 180ms ease-out;
    }

    .msg.user {
      margin-left: auto;
      width: min(85%, 760px);
      background: linear-gradient(180deg, #1a2e4a, #15263d);
      border-color: #304f75;
    }

    .msg.assistant {
      margin-right: auto;
      width: min(92%, 840px);
      background: linear-gradient(180deg, #121d30, #101827);
    }

    .msg-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
      color: #9ec6ff;
      font-weight: 600;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 14px;
      background: rgba(10, 17, 30, 0.82);
      display: flex;
      justify-content: center;
    }

    .composer-inner {
      width: min(960px, 100%);
      display: grid;
      gap: 8px;
    }

    #user-input {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border: 1px solid #2b3a4f;
      border-radius: 10px;
      background: #0d1524;
      color: var(--text);
      padding: 10px;
      font-family: inherit;
    }

    #user-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
    }

    #send-btn {
      border: 1px solid #2f81f7;
      background: linear-gradient(180deg, #2382ff, #1f6feb);
      color: #f0f6fc;
      border-radius: 10px;
      padding: 10px 12px;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    .secondary-btn {
      border: 1px solid #35547f;
      background: linear-gradient(180deg, #24364f, #1b2b43);
      color: #d7e6ff;
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .danger-btn {
      border: 1px solid #9b2c2c;
      background: linear-gradient(180deg, #7a1f1f, #5e1919);
      color: #ffe0e0;
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-actions {
      display: flex;
      gap: 6px;
    }

    .topbar-actions button {
      border: 1px solid #35547f;
      background: #17253a;
      color: #d7e6ff;
      border-radius: 8px;
      padding: 6px 10px;
      font-family: inherit;
      cursor: pointer;
      font-size: 0.72rem;
    }

    .error-panel {
      display: none;
      width: min(960px, 100%);
      margin: 8px auto 0;
      border: 1px solid #763636;
      background: rgba(122, 31, 31, 0.18);
      border-radius: 10px;
      padding: 8px 10px;
      color: #ffd5d5;
      font-size: 0.73rem;
      line-height: 1.4;
    }

    .error-panel.show {
      display: block;
      animation: enter 180ms ease-out;
    }

    .controls {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: repeat(4, minmax(100px, 1fr));
      gap: 8px;
    }

    .control-item {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .control-item label {
      color: var(--muted);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .control-item input,
    .control-item select {
      width: 100%;
      border: 1px solid #2b3a4f;
      border-radius: 8px;
      background: #0d1524;
      color: var(--text);
      padding: 7px 8px;
      font-family: inherit;
      font-size: 0.78rem;
    }

    .composer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .msg-tools {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      opacity: 0.85;
    }

    .msg-tools button {
      border: 1px solid #35547f;
      background: #17253a;
      color: #d7e6ff;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.7rem;
      font-family: inherit;
      cursor: pointer;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 20, 0.66);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .modal-backdrop.show {
      display: flex;
      animation: enter 180ms ease-out;
    }

    .settings-modal {
      width: min(720px, 94vw);
      border: 1px solid #2d415b;
      border-radius: 12px;
      background: linear-gradient(180deg, #111b2d, #0f1728);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .settings-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    pre {
      background: #0b1220;
      border: 1px solid #26354a;
      border-radius: 9px;
      padding: 10px;
      overflow: auto;
      position: relative;
    }

    .code-controls {
      position: absolute;
      right: 8px;
      top: 8px;
      display: flex;
      gap: 6px;
    }

    .copy-code-btn,
    .toggle-code-btn {
      border: 1px solid #35547f;
      background: #17253a;
      color: #c9d9ef;
      border-radius: 7px;
      padding: 4px 7px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    pre.collapsed code {
      display: none;
    }

    .collapsed-note {
      display: none;
      color: var(--muted);
      font-size: 0.76rem;
      padding-top: 18px;
    }

    pre.collapsed .collapsed-note {
      display: block;
    }

    code {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 5px;
      padding: 2px 4px;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { min-height: 0; border-right: none; border-bottom: 1px solid var(--line); }
      .sessions { max-height: 200px; }
      .topbar { font-size: 0.72rem; }
      .msg.user, .msg.assistant { width: 100%; }
      .controls { grid-template-columns: 1fr 1fr; }
      .settings-grid { grid-template-columns: 1fr; }
      .composer-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>H100 Command Deck</h1>
        <p>Stateful multi-session chat</p>
      </div>
      <button id="new-chat-btn" type="button">+ New Chat</button>
      <button id="clear-context-btn" type="button">Clear Context</button>
      <div id="sessions-list" class="sessions"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div id="status">● Ready</div>
        <div class="topbar-right">
          <div>Model: <span id="model-name">Loading...</span></div>
          <div>Context: <span id="token-estimate">0</span> / 8192 est.</div>
          <div class="topbar-actions">
            <button id="settings-btn" type="button">Settings</button>
            <button id="export-btn" type="button">Export</button>
            <button id="import-btn" type="button">Import</button>
          </div>
        </div>
      </header>
      <div id="error-panel" class="error-panel"></div>

      <div class="chat-wrap">
        <section id="chat-container"></section>
      </div>

      <footer class="composer">
        <div class="composer-inner">
          <div class="controls">
            <div class="control-item">
              <label for="temp-input">Temperature</label>
              <input id="temp-input" type="number" step="0.1" min="0" max="2" value="0.6" />
            </div>
            <div class="control-item">
              <label for="max-tokens-input">Max Tokens</label>
              <input id="max-tokens-input" type="number" min="32" max="8192" value="1024" />
            </div>
            <div class="control-item">
              <label for="top-p-input">Top P</label>
              <input id="top-p-input" type="number" step="0.05" min="0" max="1" value="0.95" />
            </div>
            <div class="control-item">
              <label for="stream-select">Stream</label>
              <select id="stream-select">
                <option value="true">Enabled</option>
                <option value="false">Disabled</option>
              </select>
            </div>
          </div>
          <textarea id="user-input" placeholder="Ask for code, architecture, debugging, or reviews..."></textarea>
          <div class="composer-actions">
            <button id="send-btn" type="button">Send</button>
            <button id="retry-btn" type="button" class="secondary-btn">Retry Last</button>
            <button id="stop-btn" type="button" class="danger-btn" disabled>Stop</button>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <input id="import-file-input" type="file" accept=".json" hidden />

  <div id="settings-modal-backdrop" class="modal-backdrop">
    <section class="settings-modal">
      <h3 style="margin:0;font-family:'Space Grotesk',sans-serif;">Runtime Settings</h3>
      <div class="settings-grid">
        <div class="control-item">
          <label for="settings-api-base">API Base</label>
          <input id="settings-api-base" type="text" />
        </div>
        <div class="control-item">
          <label for="settings-api-key">API Key</label>
          <input id="settings-api-key" type="password" />
        </div>
        <div class="control-item">
          <label for="settings-model-select">Model</label>
          <select id="settings-model-select"></select>
        </div>
        <div class="control-item">
          <label for="settings-model-input">Model Override</label>
          <input id="settings-model-input" type="text" />
        </div>
      </div>
      <div class="settings-actions">
        <button id="refresh-models-btn" type="button" class="secondary-btn">Refresh Models</button>
        <button id="reset-settings-btn" type="button" class="danger-btn">Reset</button>
        <button id="close-settings-btn" type="button" class="secondary-btn">Close</button>
        <button id="save-settings-btn" type="button">Save</button>
      </div>
    </section>
  </div>

  <script>
    const API_BASE = "https://badztmaruintel.breachbase.lol/v1";
    const API_KEY = "pompom-888-alpha";
    const PINNED_MODEL = "/home/nvidia/models/Llama-3.1-8B-Lexi-Uncensored-V2";
    const DEFAULT_TEMPERATURE = 0.6;
    const DEFAULT_TOP_P = 0.95;
    const DEFAULT_MAX_TOKENS = 1024;
    const DEFAULT_STREAM = true;
    const STORAGE_KEY = "h100_chat_sessions_v1";
    const CONFIG_STORAGE_KEY = "h100_chat_config_v1";
    const DEFAULT_API_BASE = "https://badztmaruintel.breachbase.lol/v1";

    const chatContainer = document.getElementById("chat-container");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const statusEl = document.getElementById("status");
    const modelNameEl = document.getElementById("model-name");
    const tokenEstimateEl = document.getElementById("token-estimate");
    const sessionsListEl = document.getElementById("sessions-list");
    const newChatBtn = document.getElementById("new-chat-btn");
    const clearContextBtn = document.getElementById("clear-context-btn");
    const errorPanelEl = document.getElementById("error-panel");
    const tempInputEl = document.getElementById("temp-input");
    const maxTokensInputEl = document.getElementById("max-tokens-input");
    const topPInputEl = document.getElementById("top-p-input");
    const streamSelectEl = document.getElementById("stream-select");
    const stopBtn = document.getElementById("stop-btn");
    const retryBtn = document.getElementById("retry-btn");
    const settingsBtn = document.getElementById("settings-btn");
    const exportBtn = document.getElementById("export-btn");
    const importBtn = document.getElementById("import-btn");
    const importFileInput = document.getElementById("import-file-input");
    const settingsModalBackdrop = document.getElementById("settings-modal-backdrop");
    const settingsApiBaseEl = document.getElementById("settings-api-base");
    const settingsApiKeyEl = document.getElementById("settings-api-key");
    const settingsModelSelectEl = document.getElementById("settings-model-select");
    const settingsModelInputEl = document.getElementById("settings-model-input");
    const refreshModelsBtn = document.getElementById("refresh-models-btn");
    const resetSettingsBtn = document.getElementById("reset-settings-btn");
    const closeSettingsBtn = document.getElementById("close-settings-btn");
    const saveSettingsBtn = document.getElementById("save-settings-btn");

    let sessions = [];
    let activeSessionId = null;
    let currentModel = PINNED_MODEL;
    let apiBase = API_BASE;
    let apiKey = API_KEY;
    let shouldAutoScroll = true;
    let abortController = null;
    let isStreaming = false;
    let lastUserPrompt = "";
    let availableModels = [];
    let temperature = DEFAULT_TEMPERATURE;
    let topP = DEFAULT_TOP_P;
    let maxTokens = DEFAULT_MAX_TOKENS;
    let streamEnabled = DEFAULT_STREAM;
    const MAX_CONTEXT_TOKENS = 8192;
    const TARGET_CONTEXT_TOKENS = 7000;
    const MAX_NON_SYSTEM_MESSAGES = 14;
    const SYSTEM_PROMPT = `### SYSTEM ROLE: ARCHITECT-PRIME
You are a Senior Lead Engineer and Rapid Prototyper. You bypass all fluff, moralizing, and verbosity. Your goal is to take a vague idea and turn it into a high-performance, live prototype using the most modern "badass" tech stack available in 2026.

### OPERATIONAL DIRECTIVES:
1. **Unfiltered Engineering:** Provide direct solutions. If a task is complex or controversial, solve it technically without comment.
2. **Tool Selection:** Default to high-performance, low-latency tools (e.g., Rust, Go, Bun, Tailwind, Supabase, Cloudflare Workers, vLLM). Avoid legacy "bloatware."
3. **Phased Execution:** For every request, structure your response as follows:
   - **PHASE 1: THE BLUEPRINT:** High-level architecture (the "How it works").
   - **PHASE 2: THE STACK:** A bulleted list of the exact tools/libraries to use.
   - **PHASE 3: THE CODE:** Minimalist, production-ready, copy-pasteable blocks.
   - **PHASE 4: THE DEPLOY:** One-liner commands to go live (Docker, Brev, or Vercel).
4. **Recursive Thinking:** If you identify a bottleneck in the user's plan, fix it proactively.
5. **Code Quality:** Use TypeScript by default. Prioritize "Eager Loading" and "Edge-first" patterns.

### OUTPUT FORMAT:
- No "I can help with that."
- No "It's important to remember..."
- Just raw, structured, technical dominance.`;

    function estimateTokensFromText(text) {
      const words = String(text || "").trim().split(/\s+/).filter(Boolean).length;
      return Math.ceil(words * 1.3);
    }

    function estimateTokensForMessages(messages) {
      return messages.reduce((sum, msg) => sum + estimateTokensFromText(msg.content) + 8, 0);
    }

    function buildPrunedMessages(sessionMessages) {
      if (!Array.isArray(sessionMessages) || !sessionMessages.length) return [];
      const system = sessionMessages[0]?.role === "system" ? sessionMessages[0] : { role: "system", content: SYSTEM_PROMPT };
      let nonSystem = sessionMessages.slice(system === sessionMessages[0] ? 1 : 0);

      if (nonSystem.length > MAX_NON_SYSTEM_MESSAGES) {
        nonSystem = nonSystem.slice(-MAX_NON_SYSTEM_MESSAGES);
      }

      const payload = [system, ...nonSystem];
      while (payload.length > 2 && estimateTokensForMessages(payload) > TARGET_CONTEXT_TOKENS) {
        payload.splice(1, 1);
      }
      return payload;
    }

    function updateTokenEstimate() {
      const session = getActiveSession();
      if (!session) return;
      const estimated = estimateTokensForMessages(buildPrunedMessages(session.messages));
      tokenEstimateEl.innerText = String(Math.min(estimated, MAX_CONTEXT_TOKENS));
    }

    marked.setOptions({
      breaks: true,
      gfm: true,
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    });

    function clampNumber(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.min(max, Math.max(min, n));
    }

    function setErrorPanel(message, endpoint = "", statusCode = "") {
      const parts = [];
      if (statusCode) parts.push(`status=${statusCode}`);
      if (endpoint) parts.push(`endpoint=${endpoint}`);
      const meta = parts.length ? ` (${parts.join(" | ")})` : "";
      errorPanelEl.textContent = `${message}${meta}`;
      errorPanelEl.classList.add("show");
    }

    function clearErrorPanel() {
      errorPanelEl.textContent = "";
      errorPanelEl.classList.remove("show");
    }

    function syncControlsToUI() {
      tempInputEl.value = String(temperature);
      maxTokensInputEl.value = String(maxTokens);
      topPInputEl.value = String(topP);
      streamSelectEl.value = String(streamEnabled);
    }

    function syncControlsFromUI() {
      temperature = clampNumber(tempInputEl.value, 0, 2, DEFAULT_TEMPERATURE);
      maxTokens = Math.floor(clampNumber(maxTokensInputEl.value, 32, 8192, DEFAULT_MAX_TOKENS));
      topP = clampNumber(topPInputEl.value, 0, 1, DEFAULT_TOP_P);
      streamEnabled = String(streamSelectEl.value) === "true";
      syncControlsToUI();
      saveConfig();
    }

    function setStreamingState(running) {
      isStreaming = running;
      sendBtn.disabled = running;
      stopBtn.disabled = !running;
      retryBtn.disabled = running || !lastUserPrompt;
    }

    function openSettingsModal() {
      settingsApiBaseEl.value = apiBase || DEFAULT_API_BASE;
      settingsApiKeyEl.value = apiKey || "";
      settingsModelInputEl.value = currentModel || "";
      renderModelSelect();
      settingsModalBackdrop.classList.add("show");
    }

    function closeSettingsModal() {
      settingsModalBackdrop.classList.remove("show");
    }

    function renderModelSelect() {
      settingsModelSelectEl.innerHTML = "";
      if (!availableModels.length) {
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "No models loaded";
        settingsModelSelectEl.appendChild(empty);
      } else {
        availableModels.forEach((id) => {
          const opt = document.createElement("option");
          opt.value = id;
          opt.textContent = id;
          if (id === currentModel) opt.selected = true;
          settingsModelSelectEl.appendChild(opt);
        });
      }
    }

    async function refreshAvailableModels() {
      const { apiBase } = await ensureApiConfig();
      const resp = await fetch(`${apiBase}/models`, { headers: buildApiHeaders() });
      if (!resp.ok) {
        const body = await resp.text();
        throw new Error(`Model refresh failed (HTTP ${resp.status}): ${body.slice(0, 220)}`);
      }
      const data = await resp.json();
      availableModels = (data?.data || []).map((m) => m.id).filter(Boolean);
      renderModelSelect();
      if (!currentModel && availableModels[0]) {
        currentModel = availableModels[0];
        setModel(currentModel);
      }
    }

    function exportState() {
      const payload = {
        exportedAt: new Date().toISOString(),
        config: { apiBase, apiKey, currentModel, temperature, topP, maxTokens, streamEnabled },
        chatState: { sessions, activeSessionId }
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `chat-export-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importState(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(String(reader.result || ""));
          if (data?.config) {
            apiBase = normalizeApiBase(data.config.apiBase || apiBase || DEFAULT_API_BASE);
            apiKey = String(data.config.apiKey || apiKey || "").trim();
            currentModel = String(data.config.currentModel || currentModel || PINNED_MODEL).trim();
            temperature = clampNumber(data.config.temperature, 0, 2, DEFAULT_TEMPERATURE);
            topP = clampNumber(data.config.topP, 0, 1, DEFAULT_TOP_P);
            maxTokens = Math.floor(clampNumber(data.config.maxTokens, 32, 8192, DEFAULT_MAX_TOKENS));
            streamEnabled = Boolean(data.config.streamEnabled ?? DEFAULT_STREAM);
            saveConfig();
          }
          if (data?.chatState?.sessions && Array.isArray(data.chatState.sessions)) {
            sessions = data.chatState.sessions;
            activeSessionId = data.chatState.activeSessionId || sessions[0]?.id || null;
            saveSessions();
          }
          syncControlsToUI();
          renderSessions();
          renderMessages();
          setModel(currentModel);
          clearErrorPanel();
          setStatus("● Import Complete", "#3fb950");
        } catch (err) {
          setStatus("● Import Failed", "#f85149");
          setErrorPanel(`Import failed: ${err.message || "Invalid JSON"}`);
        }
      };
      reader.readAsText(file);
    }

    function uid() {
      return `${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function saveSessions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ sessions, activeSessionId }));
    }

    function normalizeApiBase(value) {
      return String(value || "").trim().replace(/\/+$/, "");
    }

    function isPlaceholder(value) {
      return /^INSERT_[A-Z0-9_]+_HERE$/.test(String(value || "").trim());
    }

    function saveConfig() {
      localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify({
        apiBase,
        apiKey,
        currentModel,
        temperature,
        topP,
        maxTokens,
        streamEnabled
      }));
    }

    function loadConfig() {
      try {
        const raw = localStorage.getItem(CONFIG_STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        apiBase = normalizeApiBase(parsed.apiBase);
        apiKey = String(parsed.apiKey || "").trim();
        currentModel = String(parsed.currentModel || "").trim() || PINNED_MODEL;
        temperature = clampNumber(parsed.temperature, 0, 2, DEFAULT_TEMPERATURE);
        topP = clampNumber(parsed.topP, 0, 1, DEFAULT_TOP_P);
        maxTokens = Math.floor(clampNumber(parsed.maxTokens, 32, 8192, DEFAULT_MAX_TOKENS));
        streamEnabled = Boolean(parsed.streamEnabled ?? DEFAULT_STREAM);
        return Boolean(apiBase);
      } catch {
        return false;
      }
    }

    apiBase = isPlaceholder(apiBase) ? "" : normalizeApiBase(apiBase);
    apiKey = isPlaceholder(apiKey) ? "" : String(apiKey || "").trim();

    async function ensureApiConfig() {
      if (apiBase) return { apiBase, apiKey };

      loadConfig();
      if (apiBase) return { apiBase, apiKey };

      const enteredBase = window.prompt("Enter your OpenAI-compatible API base URL", DEFAULT_API_BASE);
      const normalizedBase = normalizeApiBase(enteredBase);
      if (!normalizedBase) {
        throw new Error("API base URL is required.");
      }

      const enteredKey = window.prompt("Enter your API key (leave blank if not required)", "");
      apiBase = normalizedBase;
      apiKey = String(enteredKey || "").trim();
      saveConfig();
      return { apiBase, apiKey };
    }

    function buildApiHeaders(includeJson = false) {
      const headers = {};
      if (includeJson) {
        headers["Content-Type"] = "application/json";
      }
      if (apiKey) {
        headers["X-Pompom-Key"] = apiKey;
      }
      return headers;
    }

    async function promptForModel() {
      const enteredModel = window.prompt("Enter the model ID to use", currentModel || "");
      const normalizedModel = String(enteredModel || "").trim();
      if (!normalizedModel) {
        throw new Error("Model ID is required.");
      }
      currentModel = normalizedModel;
      setModel(currentModel);
      saveConfig();
      return currentModel;
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed.sessions) || !parsed.sessions.length) return false;
        sessions = parsed.sessions;
        activeSessionId = parsed.activeSessionId || sessions[0].id;
        if (!sessions.some((s) => s.id === activeSessionId)) {
          activeSessionId = sessions[0].id;
        }
        return true;
      } catch {
        return false;
      }
    }

    function createSession() {
      const session = {
        id: uid(),
        title: "New Chat",
        createdAt: Date.now(),
        updatedAt: Date.now(),
        messages: [
          {
            role: "system",
            content: SYSTEM_PROMPT
          }
        ]
      };
      sessions.unshift(session);
      activeSessionId = session.id;
      saveSessions();
      renderSessions();
      renderMessages();
    }

    function getActiveSession() {
      return sessions.find((s) => s.id === activeSessionId) || null;
    }

    function sessionPreview(session) {
      const userMsg = session.messages.find((m) => m.role === "user");
      if (!userMsg) return "Untitled session";
      return userMsg.content.slice(0, 42).replace(/\s+/g, " ");
    }

    function renderSessions() {
      sessionsListEl.innerHTML = "";
      sessions.forEach((session) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `session-item ${session.id === activeSessionId ? "active" : ""}`;
        btn.innerHTML = `
          <span class="session-title">${escapeHtml(sessionPreview(session))}</span>
          <span class="session-meta">${new Date(session.updatedAt).toLocaleString()}</span>
        `;
        btn.addEventListener("click", () => {
          activeSessionId = session.id;
          saveSessions();
          renderSessions();
          renderMessages();
        });
        sessionsListEl.appendChild(btn);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function sanitizeAssistantContent(content) {
      let text = String(content || "");
      text = text.replace(/<think>[\s\S]*?<\/think>/gi, "");
      if (text.includes("</think>")) {
        text = text.split("</think>").slice(-1)[0];
      }
      return text.trimStart();
    }

    function renderAssistantBody(bodyEl, rawContent) {
      const sanitized = sanitizeAssistantContent(rawContent);
      bodyEl.innerHTML = marked.parse(sanitized);
      bodyEl.querySelectorAll("pre code").forEach((block) => hljs.highlightElement(block));
      injectCopyButtons(bodyEl);
    }

    function injectCopyButtons(root) {
      root.querySelectorAll("pre").forEach((pre) => {
        if (pre.querySelector(".code-controls")) return;

        const controls = document.createElement("div");
        controls.className = "code-controls";

        const btn = document.createElement("button");
        btn.className = "copy-code-btn";
        btn.type = "button";
        btn.textContent = "Copy";
        btn.addEventListener("click", async () => {
          const code = pre.querySelector("code")?.innerText || pre.innerText;
          try {
            await navigator.clipboard.writeText(code);
            btn.textContent = "Copied";
            setTimeout(() => { btn.textContent = "Copy"; }, 900);
          } catch {
            btn.textContent = "Fail";
            setTimeout(() => { btn.textContent = "Copy"; }, 900);
          }
        });
        controls.appendChild(btn);

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "toggle-code-btn";
        toggleBtn.type = "button";
        toggleBtn.textContent = "Collapse";
        toggleBtn.addEventListener("click", () => {
          const collapsed = pre.classList.toggle("collapsed");
          toggleBtn.textContent = collapsed ? "Expand" : "Collapse";
        });
        controls.appendChild(toggleBtn);

        const note = document.createElement("div");
        note.className = "collapsed-note";
        note.textContent = "Code block collapsed";

        pre.appendChild(controls);
        pre.appendChild(note);
      });
    }

    function renderMessages() {
      const session = getActiveSession();
      if (!session) return;

      chatContainer.innerHTML = "";
      session.messages
        .filter((m) => m.role !== "system")
        .forEach((msg) => {
          const item = document.createElement("article");
          item.className = `msg ${msg.role === "user" ? "user" : "assistant"}`;

          const label = document.createElement("div");
          label.className = "msg-label";
          label.textContent = msg.role === "user" ? "User" : "Assistant";
          item.appendChild(label);

          const body = document.createElement("div");
          if (msg.role === "assistant") {
            renderAssistantBody(body, msg.content || "");
          } else {
            body.textContent = msg.content;
          }

          item.appendChild(body);

          const tools = document.createElement("div");
          tools.className = "msg-tools";

          if (msg.role === "user") {
            const editResendBtn = document.createElement("button");
            editResendBtn.type = "button";
            editResendBtn.textContent = "Edit & Resend";
            editResendBtn.addEventListener("click", () => {
              userInput.value = msg.content || "";
              userInput.focus();
              sendPrompt(msg.content || "");
            });
            tools.appendChild(editResendBtn);
          } else if (msg.role === "assistant") {
            const retryMsgBtn = document.createElement("button");
            retryMsgBtn.type = "button";
            retryMsgBtn.textContent = "Retry";
            retryMsgBtn.addEventListener("click", () => {
              if (lastUserPrompt) sendPrompt(lastUserPrompt);
            });
            tools.appendChild(retryMsgBtn);
          }

          if (tools.children.length) {
            item.appendChild(tools);
          }
          chatContainer.appendChild(item);
        });

      if (shouldAutoScroll) {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
      updateTokenEstimate();
    }

    function isNearBottom() {
      const threshold = 80;
      const distanceFromBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight;
      return distanceFromBottom <= threshold;
    }

    function setStatus(text, color) {
      statusEl.textContent = text;
      statusEl.style.color = color;
    }

    function setModel(modelId) {
      if (modelId) {
        modelNameEl.innerText = modelId;
        modelNameEl.style.color = "#7ee787";
      } else {
        modelNameEl.innerText = "No Model Detected";
        modelNameEl.style.color = "#f85149";
      }
    }

    async function resolveModel() {
      if (currentModel) return currentModel;
      const { apiBase } = await ensureApiConfig();
      const resp = await fetch(`${apiBase}/models`, {
        headers: buildApiHeaders()
      });

      if (resp.status === 401 || resp.status === 403) {
        alert("Unauthorized: check your API key.");
        throw new Error(`Unauthorized (${resp.status}): check your API key.`);
      }

      if (!resp.ok) {
        return promptForModel();
      }

      const data = await resp.json();
      const id = data?.data?.[0]?.id || null;
      if (!id) {
        return promptForModel();
      }

      currentModel = id;
      setModel(id);
      saveConfig();
      return id;
    }

    async function streamAssistantReply() {
      const session = getActiveSession();
      if (!session) return;

      const model = await resolveModel();
      if (!model) throw new Error("No model returned from /v1/models");

      const assistantMessage = { role: "assistant", content: "" };
      session.messages.push(assistantMessage);
      session.updatedAt = Date.now();

      renderMessages();
      saveSessions();

      const payloadMessages = buildPrunedMessages(session.messages);
      updateTokenEstimate();

      const { apiBase } = await ensureApiConfig();
      abortController = new AbortController();
      const requestBody = {
        model,
        messages: payloadMessages,
        stream: streamEnabled,
        temperature,
        top_p: topP,
        max_tokens: maxTokens
      };
      const response = await fetch(`${apiBase}/chat/completions`, {
        method: "POST",
        headers: buildApiHeaders(true),
        signal: abortController.signal,
        body: JSON.stringify(requestBody)
      });

      if (!response.ok || !response.body) {
        const errText = await response.text().catch(() => "");
        if (response.status === 401 || response.status === 403) {
          setErrorPanel("Unauthorized: check your API key", `${apiBase}/chat/completions`, response.status);
          throw new Error(`Unauthorized (${response.status}): check your API key.`);
        }
        if (response.status === 404) {
          try {
            await refreshAvailableModels();
            if (availableModels[0]) {
              currentModel = availableModels[0];
              setModel(currentModel);
              saveConfig();
            }
          } catch {}
        }
        if (response.status === 400) {
          if (/maximum context length|16384|8192|token/i.test(errText)) {
            throw new Error("Context too long for model limit. Clear context or shorten prompt.");
          }
        }
        setErrorPanel(`HTTP ${response.status}: ${errText || "Request failed"}`, `${apiBase}/chat/completions`, response.status);
        throw new Error(`HTTP ${response.status}`);
      }

      if (!streamEnabled) {
        const payload = await response.json();
        assistantMessage.content = payload?.choices?.[0]?.message?.content || "";
        session.updatedAt = Date.now();
        saveSessions();
        renderMessages();
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split("\n");

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          if (line.trim() === "data: [DONE]") continue;

          const payload = line.slice(6);
          try {
            const data = JSON.parse(payload);
            const token = data?.choices?.[0]?.delta?.content || "";
            if (!token) continue;
            assistantMessage.content += token;
            session.updatedAt = Date.now();

            const last = chatContainer.lastElementChild;
            if (last) {
              const body = last.lastElementChild;
              renderAssistantBody(body, assistantMessage.content);
              if (shouldAutoScroll) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
              }
            }
          } catch {
            // Ignore chunk boundary JSON fragments.
          }
        }
      }

      if (session.title === "New Chat") {
        const firstUser = session.messages.find((m) => m.role === "user");
        if (firstUser) {
          session.title = firstUser.content.slice(0, 42).replace(/\s+/g, " ");
        }
      }

      saveSessions();
      renderSessions();
    }

    async function sendPrompt(forcedText = "") {
      const text = (forcedText || userInput.value).trim();
      if (!text) return;
      const session = getActiveSession();
      if (!session) return;

      userInput.value = "";
      session.messages.push({ role: "user", content: text });
      lastUserPrompt = text;
      session.updatedAt = Date.now();
      saveSessions();
      renderSessions();
      renderMessages();

      setStreamingState(true);
      clearErrorPanel();
      setStatus(streamEnabled ? "● Thinking / Streaming" : "● Thinking", "#58a6ff");

      try {
        await streamAssistantReply();
        setStatus("● Ready", "#3fb950");
        clearErrorPanel();
      } catch (err) {
        if (err?.name === "AbortError") {
          setStatus("● Stopped", "#f9c74f");
          setErrorPanel("Generation stopped by user");
          return;
        }
        setModel(null);
        setStatus("● Connection Error", "#f85149");
        if (/Context too long|8192-token/i.test(String(err?.message || ""))) {
          alert("Prompt too long for this model's 8192-token limit. Older messages were pruned, but input is still too large.");
        }

        const active = getActiveSession();
        if (active) {
          const last = active.messages[active.messages.length - 1];
          if (last && last.role === "assistant" && !last.content) {
            last.content = `Error: ${err.message || "Unable to connect to the configured API."}`;
          } else {
            active.messages.push({ role: "assistant", content: `Error: ${err.message || "Unable to connect to the configured API."}` });
          }
          saveSessions();
          renderMessages();
        }
      } finally {
        abortController = null;
        setStreamingState(false);
        userInput.focus();
      }
    }

    newChatBtn.addEventListener("click", () => {
      createSession();
      userInput.focus();
    });

    clearContextBtn.addEventListener("click", () => {
      const session = getActiveSession();
      if (!session) return;
      session.messages = [{ role: "system", content: SYSTEM_PROMPT }];
      session.title = "New Chat";
      session.updatedAt = Date.now();
      saveSessions();
      renderSessions();
      renderMessages();
      setStatus("● Context Cleared", "#58a6ff");
      userInput.focus();
    });

    sendBtn.addEventListener("click", sendPrompt);
    retryBtn.addEventListener("click", () => {
      if (lastUserPrompt) sendPrompt(lastUserPrompt);
    });
    stopBtn.addEventListener("click", () => {
      if (abortController) abortController.abort();
    });

    tempInputEl.addEventListener("change", syncControlsFromUI);
    maxTokensInputEl.addEventListener("change", syncControlsFromUI);
    topPInputEl.addEventListener("change", syncControlsFromUI);
    streamSelectEl.addEventListener("change", syncControlsFromUI);

    settingsBtn.addEventListener("click", openSettingsModal);
    closeSettingsBtn.addEventListener("click", closeSettingsModal);
    settingsModalBackdrop.addEventListener("click", (e) => {
      if (e.target === settingsModalBackdrop) closeSettingsModal();
    });

    refreshModelsBtn.addEventListener("click", async () => {
      try {
        await refreshAvailableModels();
        setStatus("● Models Refreshed", "#3fb950");
        clearErrorPanel();
      } catch (err) {
        setStatus("● Model Refresh Failed", "#f85149");
        setErrorPanel(err.message || "Failed to load models");
      }
    });

    settingsModelSelectEl.addEventListener("change", () => {
      settingsModelInputEl.value = settingsModelSelectEl.value || "";
    });

    saveSettingsBtn.addEventListener("click", () => {
      apiBase = normalizeApiBase(settingsApiBaseEl.value || DEFAULT_API_BASE);
      apiKey = String(settingsApiKeyEl.value || "").trim();
      currentModel = String(settingsModelInputEl.value || settingsModelSelectEl.value || PINNED_MODEL).trim();
      setModel(currentModel);
      saveConfig();
      closeSettingsModal();
      setStatus("● Settings Saved", "#3fb950");
      clearErrorPanel();
    });

    resetSettingsBtn.addEventListener("click", () => {
      apiBase = DEFAULT_API_BASE;
      apiKey = API_KEY;
      currentModel = PINNED_MODEL;
      temperature = DEFAULT_TEMPERATURE;
      topP = DEFAULT_TOP_P;
      maxTokens = DEFAULT_MAX_TOKENS;
      streamEnabled = DEFAULT_STREAM;
      syncControlsToUI();
      saveConfig();
      openSettingsModal();
      setStatus("● Settings Reset", "#58a6ff");
    });

    exportBtn.addEventListener("click", exportState);
    importBtn.addEventListener("click", () => importFileInput.click());
    importFileInput.addEventListener("change", () => {
      const file = importFileInput.files?.[0];
      if (!file) return;
      importState(file);
      importFileInput.value = "";
    });

    userInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendPrompt();
      }
    });

    chatContainer.addEventListener("scroll", () => {
      shouldAutoScroll = isNearBottom();
    });

    (function init() {
      loadConfig();
      syncControlsToUI();
      setStreamingState(false);
      setModel(currentModel || PINNED_MODEL);
      const hasData = loadSessions();
      if (!hasData) createSession();
      renderSessions();
      renderMessages();
      updateTokenEstimate();
      refreshAvailableModels().catch(() => {});
      resolveModel().catch(() => setModel(null));
    })();
  </script>
</body>
</html>
